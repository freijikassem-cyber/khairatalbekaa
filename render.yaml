services:
  - type: web
    name: khairat-shop
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        value: kassem
      - key: DJANGO_SUPERUSER_EMAIL
        value: freiji.kassem@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.6
