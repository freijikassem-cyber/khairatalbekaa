<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول — خيرات البقاع الاخضر</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  body{font-family:'Tajawal',sans-serif; background:linear-gradient(135deg,#115a2b,#1b7a3d); min-height:100vh}
  .login-card{max-width:400px; border:none; border-radius:18px}
  .brand{color:#115a2b; font-weight:800}
  .btn-shop{background:#1b7a3d; color:#fff; font-weight:700}
  .btn-shop:hover{background:#115a2b; color:#fff}
</style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
  <div class="card login-card shadow-lg w-100">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div style="font-size:44px">🌿</div>
        <h1 class="brand fs-4 mb-1">خيرات البقاع الاخضر</h1>
        <div class="text-muted small">إدارة المحل — مخزون · فواتير · تقارير</div>
      </div>
      {% if form.errors %}
        <div class="alert alert-danger py-2 small">اسم المستخدم أو كلمة المرور غير صحيحة</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label small text-muted">اسم المستخدم</label>
          <input type="text" name="username" class="form-control form-control-lg" autofocus autocapitalize="none" required>
        </div>
        <div class="mb-4">
          <label class="form-label small text-muted">كلمة المرور</label>
          <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-shop btn-lg w-100">دخول</button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</body>
</html>
